<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logged Out - Hospital Management System</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            font-family: 'Poppins', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;

            /* Same professional background as login */
            background: 
                linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
                url("https://img.freepik.com/free-photo/modern-hospital-building_1127-3301.jpg?w=1480") 
                no-repeat center center/cover;
        }

        .logout-box {
            text-align: center;
            width: 450px;
            padding: 35px;
            border-radius: 18px;

            /* Glass effect */
            background: rgba(255, 255, 255, 0.22);
            backdrop-filter: blur(15px);

            box-shadow: 0px 8px 25px rgba(0,0,0,0.4);
            color: white;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
        }

        p {
            font-size: 16px;
            margin-top: 12px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            transition: 0.25s ease-in-out;
        }

        a:hover {
            background: #0056d6;
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <div class="logout-box">
        <h2>You have successfully logged out.</h2>
        <p>Thank you for using the Hospital Management System.</p>

        <a href="/accounts/login/">Login Again</a>
    </div>

</body>
</html>
